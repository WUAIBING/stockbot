name: Sync DO Repo

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview sync without changing /opt/stockbot.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: stockbot-sync-do-repo
  cancel-in-progress: false

jobs:
  sync-do-repo:
    runs-on:
      - self-hosted
      - linux
      - stockbot-do
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify checkout provenance
        shell: bash
        run: |
          bash "$GITHUB_WORKSPACE/scripts/github-actions/verify_checkout_provenance.sh" \
            "$GITHUB_WORKSPACE" \
            "$GITHUB_SHA" \
            "${{ github.ref_name }}"

      - name: Sync checkout to /opt/stockbot
        shell: bash
        env:
          SYNC_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          SYNC_SOURCE_SHA: ${{ github.sha }}
          SYNC_SOURCE_BRANCH: ${{ github.ref_name }}
          SYNC_SOURCE_REMOTE_URL: https://github.com/${{ github.repository }}
        run: |
          bash "$GITHUB_WORKSPACE/scripts/github-actions/sync_repo_to_do.sh" "$GITHUB_WORKSPACE" /opt/stockbot

      - name: Show synced revision
        shell: bash
        run: |
          echo "GitHub SHA: $GITHUB_SHA"
          if [ -f /opt/stockbot/.stockbot-sync-source-sha ]; then
            echo "Recorded synced SHA: $(cat /opt/stockbot/.stockbot-sync-source-sha)"
          fi
          echo "Synced docs:"
          ls -la /opt/stockbot/docs | head -n 20
